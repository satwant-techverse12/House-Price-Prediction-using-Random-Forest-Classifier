<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            padding: 10px;
            width: 95%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>🏠 House Price Prediction</h2>

<form method="POST">

    <input type="number" name="area" placeholder="Area (sq ft)" required>

    <input type="number" name="bedrooms" placeholder="Bedrooms" required>

    <input type="number" name="bathrooms" placeholder="Bathrooms" required>

    <input type="number" name="stories" placeholder="Stories" required>

    <!-- YES / NO FEATURES -->
    <label>Main Road:</label>
    <select name="mainroad">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Guest Room:</label>
    <select name="guestroom">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Basement:</label>
    <select name="basement">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Hot Water Heating:</label>
    <select name="hotwaterheating">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Air Conditioning:</label>
    <select name="airconditioning">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <input type="number" name="parking" placeholder="Parking Spaces" required>

    <label>Preferred Area:</label>
    <select name="prefarea">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <!-- FURNISHING -->
    <label>Furnishing Status:</label>
    <select name="furnishingstatus">
        <option value="furnished">Furnished</option>
        <option value="semi-furnished">Semi-Furnished</option>
        <option value="unfurnished">Unfurnished</option>
    </select>

    <button type="submit">Predict Price</button>

</form>

{% if prediction %}
    <h3>💰 Predicted Price: ₹ {{ prediction }}</h3>
{% endif %}

</body>
</html>
