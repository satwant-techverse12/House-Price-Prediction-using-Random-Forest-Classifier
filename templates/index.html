<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 25px 30px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            color: #2a5298;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🏠 House Price Prediction</h2>

    <form method="POST">

        <label>Area (sq ft)</label>
        <input type="number" name="area" required>

        <label>Bedrooms</label>
        <input type="number" name="bedrooms" required>

        <label>Bathrooms</label>
        <input type="number" name="bathrooms" required>

        <label>Stories</label>
        <input type="number" name="stories" required>

        <label>Main Road</label>
        <select name="mainroad">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Guest Room</label>
        <select name="guestroom">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Basement</label>
        <select name="basement">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Hot Water Heating</label>
        <select name="hotwaterheating">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Air Conditioning</label>
        <select name="airconditioning">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Parking</label>
        <input type="number" name="parking" required>

        <label>Preferred Area</label>
        <select name="prefarea">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Furnishing Status</label>
        <select name="furnishingstatus">
            <option value="furnished">Furnished</option>
            <option value="semi-furnished">Semi-Furnished</option>
            <option value="unfurnished">Unfurnished</option>
        </select>

        <button type="submit">Predict Price</button>

    </form>

    {% if prediction %}
        <div class="result">
            💰 Estimated Price: ₹ {{ "{:,.0f}".format(prediction) }}
        </div>
    {% endif %}

</div>

</body>
</html>
